# Sets up a development environment for the chip-in-inventory application.
#
# Services:
#   - chip-in-inventory: The main Rust application, using the image from GitHub Container Registry.
#   - etcd: The etcd datastore used as the backend.
#
# Usage: docker-compose up
# The API is available at http://localhost:3000.

services:
  # The Rust API server
  chip-in-inventory:
    image: ghcr.io/srfeo3/chip-in-inventory:latest
    ports:
      - "3000:3000"
    environment:
      # Set the etcd endpoint to the service name 'etcd' within the Docker network
      - ETCD_ENDPOINTS=http://etcd:2379
      # Set the log level
      - RUST_LOG=info
    volumes:
      - ./conf:/conf
    depends_on:
      - etcd

  # The etcd backend datastore
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    ports:
      - "2379:2379"
    command: >
      etcd
      --advertise-client-urls http://etcd:2379
      --listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd-data
    volumes:
      - etcd_data:/etcd-data

volumes:
  etcd_data:
