name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          sudo apt-get install protobuf-compiler

      - name: Build binaries
        run: cargo build --target x86_64-unknown-linux-musl --release

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/chip-in-inventory

      - name: Generate embedded etcd files
        run: |
          cat <<EOF > Dockerfile.embedded
          FROM quay.io/coreos/etcd:v3.5.14 AS etcd
          FROM alpine:3.18
          RUN apk add --no-cache bash ca-certificates
          COPY --from=etcd /usr/local/bin/etcd /usr/local/bin/etcd
          COPY --from=etcd /usr/local/bin/etcdctl /usr/local/bin/etcdctl
          COPY target/x86_64-unknown-linux-musl/release/chip-in-inventory /usr/local/bin/chip-in-inventory
          COPY entrypoint.sh /entrypoint.sh
          RUN chmod +x /entrypoint.sh
          ENTRYPOINT ["/entrypoint.sh"]
          EOF

          cat <<'EOF' > entrypoint.sh
          #!/bin/bash
          set -e
          etcd --data-dir /etcd-data \
               --listen-client-urls http://0.0.0.0:2379 \
               --advertise-client-urls http://127.0.0.1:2379 &
          until bash -c "echo > /dev/tcp/127.0.0.1/2379" 2>/dev/null; do
            sleep 1
          done
          export ETCD_ENDPOINTS=http://127.0.0.1:2379
          exec chip-in-inventory
          EOF

      - name: Prepare assets
        run: |
          mkdir -p release-assets
          cp target/x86_64-unknown-linux-musl/release/chip-in-inventory release-assets/chip-in-inventory
          cat <<EOF > release-assets/Dockerfile
          FROM scratch
          COPY chip-in-inventory /chip-in-inventory
          ENTRYPOINT ["/chip-in-inventory"]
          EOF

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          body: "Automatically built from the latest commit on main branch."
          files: |
            release-assets/chip-in-inventory

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Extract Docker metadata (embedded)
        id: meta-embedded
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-embedded-etcd
          tags: |
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: release-assets
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Build and push embedded Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.embedded
          push: true
          tags: ${{ steps.meta-embedded.outputs.tags }}
